spring.application.name=order-management-system
server.port=8080
server.servlet.context-path=/

# ============================================================
# MySQL DataSource
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/order_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=samay
spring.datasource.password=Samay@3005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# HikariCP Connection Pool
# ============================================================
spring.datasource.hikari.pool-name=OrderManagementPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# ============================================================
# Spring Boot Auto-Configuration
# ============================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# ============================================================
# Redis
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

# ============================================================
# Kafka
# ============================================================
app.kafka.history-topic=history-events
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-management-history-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=practice.samay.ordermanagementsystem.event
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=practice.samay.ordermanagementsystem.event.HistoryEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false

# ============================================================
# Hibernate / SessionFactory
# ============================================================
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.hbm2ddl.auto=update
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext
hibernate.jdbc.batch_size=20
hibernate.order_inserts=true
hibernate.order_updates=true

# ============================================================
# Jackson / JSON
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ============================================================
# Logging
# ============================================================
logging.level.practice.samay=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.orm=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.com.zaxxer.hikari=INFO
